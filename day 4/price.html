<!DOCTYPE html>
<html>

<head>

<style>

body{
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f4f4f4;
font-family:Arial;
}

.card{
width:300px;
background:white;
padding:30px;
text-align:center;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
transition:.4s;
}

.card:hover{
transform:scale(1.05);
}

.price{
font-size:40px;
color:#27ae60;
margin:20px;
}

ul{
list-style:none;
padding:0;
}

li{
padding:10px;
}

button{
padding:12px 25px;
background:#27ae60;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1e8449;
}

</style>

</head>

<body>

<div class="card">

<h2>Basic Plan</h2>

<div class="price">$19/month</div>

<ul>
<li>✔ 10 GB Storage</li>
<li>✔ Free Support</li>
<li>✔ 5 Users</li>
</ul>

<button>Choose Plan</button>

</div>

</body>

</html>
