<!DOCTYPE html>
<html>

<head>

<style>

body{
margin:20px;
}

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:10px;
transition:.4s;
}

.gallery img:hover{
transform:scale(1.05);
}

@media(max-width:768px){
.gallery{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:500px){
.gallery{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<div class="gallery">

<img src="https://via.placeholder.com/300">

<img src="https://via.placeholder.com/300">

<img src="https://via.placeholder.com/300">

<img src="https://via.placeholder.com/300">

<img src="https://via.placeholder.com/300">

<img src="https://via.placeholder.com/300">

</div>

</body>
</html>
