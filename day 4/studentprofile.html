<!DOCTYPE html>
<html>
<head>
    <title>Student Profile Card</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f0f2f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            width:300px;
            background:white;
            border-radius:15px;
            overflow:hidden;
            box-shadow:0 5px 15px rgba(0,0,0,.2);
            transition:.4s;
            text-align:center;
        }

        .card:hover{
            transform:translateY(-10px) scale(1.05);
        }

        .card img{
            width:100%;
            height:300px;
            object-fit:cover;
        }

        h2{
            margin-top:15px;
        }

        p{
            color:gray;
            margin:15px;
        }
    </style>
</head>
<body>

<div class="card">
    <img src="WhatsApp Image 2026-07-16 at 8.17.36 PM.jpeg" alt="Student Image">
    <h2>Monisha</h2>
    <p>B.Tech IT</p>
</div>

</body>
</html>
