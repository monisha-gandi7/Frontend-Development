<!DOCTYPE html>
<html>
<head>

<style>

body{
font-family:Arial;
background:#eee;
}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
padding:40px;
}

.card{
width:250px;
background:white;
border-radius:10px;
text-align:center;
box-shadow:0 4px 10px gray;
padding:15px;
}

img{
width:100%;
}

button{
padding:10px 20px;
background:#3498db;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<img src="https://via.placeholder.com/250">

<h2>Headphones</h2>

<p>$99</p>

<button>Buy Now</button>

</div>

<div class="card">

<img src="https://via.placeholder.com/250">

<h2>Watch</h2>

<p>$150</p>

<button>Buy Now</button>

</div>

</div>

</body>
</html>
